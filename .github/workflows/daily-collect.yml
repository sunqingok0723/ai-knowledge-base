name: Daily Collect

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect articles
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || '' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || '' }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY || '' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
        run: python pipeline/pipeline.py --sources github,rss --limit 20 --verbose

      - name: Validate articles
        run: |
          python hooks/validate_json.py knowledge/articles/*.json
          python hooks/check_quality.py knowledge/articles/*.json

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        run: |
          git add knowledge/articles/ knowledge/raw/
          if git diff --cached --quiet; then
            echo "No new articles to commit."
          else
            COUNT=$(git diff --cached --name-only knowledge/articles/ | wc -l)
            DATE=$(date +%Y-%m-%d)
            git commit -m "chore: daily collect $DATE ($COUNT articles)"
            git push
          fi
